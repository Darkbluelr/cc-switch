name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows Release
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm
        run: npm install -g pnpm@10.29.3

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Disable updater artifacts in CI
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("fs");
          const path = "src-tauri/tauri.conf.json";
          const config = JSON.parse(fs.readFileSync(path, "utf8"));
          config.bundle = config.bundle || {};
          config.bundle.createUpdaterArtifacts = false;
          fs.writeFileSync(path, JSON.stringify(config, null, 2) + "\n");
          NODE

      - name: Build Tauri App
        run: pnpm tauri build

      - name: Prepare release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $version = $env:GITHUB_REF_NAME

          $msi = Get-ChildItem -Path 'src-tauri/target/release/bundle' -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $msi) {
            throw 'Windows MSI installer not found under src-tauri/target/release/bundle'
          }

          $msiName = "CC-Switch-$version-Windows.msi"
          Copy-Item $msi.FullName (Join-Path release-assets $msiName)

          $exeCandidates = @(
            'src-tauri/target/release/cc-switch.exe',
            'src-tauri/target/x86_64-pc-windows-msvc/release/cc-switch.exe'
          )
          $exePath = $exeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($null -eq $exePath) {
            throw 'Portable exe not found'
          }

          $portableDir = 'release-assets/CC-Switch-Portable'
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          Copy-Item $exePath $portableDir
          @(
            '# CC Switch portable build marker',
            'portable=true'
          ) | Set-Content -Path (Join-Path $portableDir 'portable.ini') -Encoding UTF8

          $portableZip = "release-assets/CC-Switch-$version-Windows-Portable.zip"
          Compress-Archive -Path "$portableDir/*" -DestinationPath $portableZip -Force
          Remove-Item -Recurse -Force $portableDir

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-windows
          path: release-assets/*
          if-no-files-found: error

      - name: List generated bundles
        if: always()
        shell: bash
        run: |
          echo "Listing bundles in src-tauri/target..."
          find src-tauri/target -maxdepth 4 -type f -name "*.*" 2>/dev/null || true

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: build-windows
    permissions:
      contents: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: List downloaded artifacts
        shell: bash
        run: ls -la release-assets

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CC Switch ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## CC Switch ${{ github.ref_name }}

            Windows release assets:

            - `CC-Switch-${{ github.ref_name }}-Windows.msi`: installer build
            - `CC-Switch-${{ github.ref_name }}-Windows-Portable.zip`: portable build
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
